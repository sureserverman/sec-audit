server {
    listen 443 ssl;
    server_name example.test;

    # Weak TLS — CWE-326
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Info leak — CWE-200
    server_tokens on;

    # Missing HSTS header (CWE-319)

    location / {
        proxy_pass http://127.0.0.1:8000;
    }
}
