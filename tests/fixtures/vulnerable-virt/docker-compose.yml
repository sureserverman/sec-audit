# Intentionally insecure Compose file — the source of virt-runner's kics
# findings (kics --type DockerCompose scans this; hadolint does not, it scans
# Containerfiles) and the sec-expert reading of references/virt/compose-hardening.md.

version: "3.8"

services:
  watchtower:
    image: containrrr/watchtower:latest
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  api:
    image: ghcr.io/example/api:stable
    environment:
      DB_PASSWORD: hunter2
    secrets:
      - db_password

secrets:
  db_password:
    external: true
